spring:
  datasource:
    url: jdbc:mysql://localhost:3306/itheima_mp_demo?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
logging:
  level:
    com.itheima: debug
  pattern:
    dateformat: HH:mm:ss
mybatis-plus:
  type-aliases-package: com.itheima.mp.domain.po # 别名扫描包
  mapper-locations: classpath*:mapper/**/*.xml # Mapper.xml文件地址，默认值
  global-config:
    db-config:
      id-type: auto # id为自增长
